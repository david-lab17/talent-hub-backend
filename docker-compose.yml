services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Developer33159718}
      POSTGRES_DB: talentarc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql://admin:${DB_PASSWORD:-Developer33159718}@db:5432/talentarc
      PORT: ${PORT:-3001}
      SESSION_SECRET: ${SESSION_SECRET:-your-super-secret-session-key-change-in-production}
      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:5174,https://talent-hub-admin-portal.vercel.app,https://talent-hub-candidate-portal.vercel.app}
      SECURE_COOKIES: ${SECURE_COOKIES:true}
    ports:
      - "3001:3001"
    depends_on:
      - db

volumes:
  postgres_data:
